# Phase 1 hard batch-generation config.
# Uses accessible Easy/prevalent short fill plus curated hard longer fill.

puzzle:
  type: mini
  grid_size: 5

dictionary:
  path: dictionaries/hgg-hard-flat-55.txt
  min_word_score: 55
  min_2letter_score: 55
  themed_path: dictionaries/hgg-hard-flat-55.txt
  themed_min_word_score: 55
  themed_min_2letter_score: 55

fill:
  provider: csp
  max_retries: 5
  max_grid_variants: 100
  csp:
    dictionary_path: dictionaries/hgg-hard-flat-55.txt
    min_word_score: 55
    min_2letter_score: 55
    timeout: 30
    timeout_by_size:
      5: 30
      7: 120
      9: 300
    quality_tiers: [55]

grading:
  fill:
    min_score: 51
    retry_on_fail: true
    collect_boards: 1
    llm_select: false
  clue:
    min_score: 70
    regenerate_on_fail: true
    accuracy_repair_threshold: 12

llm:
  provider: ollama
  ollama:
    base_url: "http://localhost:11434"
    model: llama3
    timeout: 120
  claude:
    model: claude-haiku-4-5-20251001
    clue_generation_model: claude-sonnet-4-6
    clue_grading_model: claude-sonnet-4-6
    max_tokens: 4096
    timeout: 120

theme:
  enabled: false

output:
  directory: output/review/hard
  formats:
    - ipuz
