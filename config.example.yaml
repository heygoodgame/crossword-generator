# Crossword Generator Configuration

puzzle:
  type: mini        # mini or midi
  grid_size: 5      # 5, 7 for mini; 9, 11 for midi

dictionary:
  path: dictionaries/HggScoredCrosswordList.txt
  min_word_score: 50
  # For midi grids, 2-letter words may need a lower threshold
  min_2letter_score: 30

fill:
  provider: csp
  max_retries: 5
  csp:
    dictionary_path: dictionaries/HggScoredCrosswordList.txt
    min_word_score: 50
    min_2letter_score: 30
    timeout: 30
    # Per-size timeout overrides (seconds). Falls back to `timeout` for unlisted sizes.
    # timeout_by_size:
    #   5: 30
    #   7: 120
    #   9: 300

grading:
  fill:
    min_score: 70           # Minimum overall fill quality score (0-100)
    retry_on_fail: true
    collect_boards: 1       # Collect up to N unique passing boards (1 = stop at first)
    llm_select: false       # Use LLM to pick best board (requires collect_boards > 1)
  clue:
    min_score: 70           # Minimum clue quality score (0-100)
    regenerate_on_fail: true

llm:
  provider: ollama  # "ollama" or "claude"
  ollama:
    base_url: "http://localhost:11434"
    model: llama3
    timeout: 120
  claude:
    model: claude-haiku-4-5-20251001
    max_tokens: 4096
    timeout: 120

output:
  directory: output
  formats:
    - puz
    - ipuz
